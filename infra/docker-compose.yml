services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: infodemic
    ports:
      - "5432:5432"
    volumes:
      - infodemic_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - infodemic_storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../backend:/app
      - infodemic_storage:/app/storage
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=INFO
    depends_on:
      - db
      - redis

volumes:
  infodemic_pgdata:
  infodemic_storage:
